<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naruto · Kejar Ramen</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f44 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Naruto', system-ui, sans-serif;
      padding: 16px;
      margin: 0;
    }

    .game-container {
      background: #e3b17b;
      background-image: radial-gradient(circle at 20% 30%, #f5d6b3, #c68e5a);
      padding: 24px 24px 30px;
      border-radius: 72px 72px 48px 48px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 2px 8px rgba(255,215,150,0.6);
      border: 4px solid #b47b48;
      position: relative;
      transition: 0.2s;
    }

    /* elemen ninja */
    .game-panel {
      background: #fef2d6;
      border-radius: 48px 48px 32px 32px;
      padding: 20px 20px 16px;
      box-shadow: inset 0 -6px 0 #a77b4d, 0 12px 18px rgba(0,0,0,0.3);
      border: 2px solid #dba16b;
    }

    /* area permainan */
    .game-board {
      position: relative;
      width: 520px;
      height: 320px;
      background: #7fb07f;
      background-image: 
        linear-gradient(rgba(50, 80, 30, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(50, 80, 30, 0.3) 1px, transparent 1px);
      background-size: 40px 40px;
      border-radius: 36px;
      border: 6px solid #4f6b3a;
      box-shadow: inset 0 0 0 4px #a1c9a1, inset 0 0 0 8px #5f7e4a;
      margin: 4px auto;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="rgba(255,200,50,0.2)" stroke="%23ff8800" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="%23ffaa00" stroke="%23cc5500" stroke-width="2"/></svg>') 16 16, auto;
      transition: background 0.1s;
      overflow: hidden;
    }

    /* karakter Naruto */
    .naruto {
      position: absolute;
      width: 64px;
      height: 64px;
      bottom: 20px;
      left: 40px;
      transition: left 0.08s ease, top 0.08s ease;
      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.4));
      z-index: 10;
      pointer-events: none;
    }

    .naruto img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* mangkuk ramen */
    .ramen {
      position: absolute;
      width: 58px;
      height: 58px;
      bottom: 30px;
      left: 200px;
      transition: all 0.15s cubic-bezier(0.34, 1.4, 0.64, 1);
      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.5));
      z-index: 5;
      pointer-events: none;
    }

    .ramen img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* score & kontrol */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding: 0 8px;
      color: #1f2e1b;
      font-weight: bold;
      text-shadow: 0 1px 0 #f7e3c0;
    }

    .score-box {
      background: #283c1f;
      padding: 8px 24px;
      border-radius: 60px;
      color: #f7e9b0;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: inset 0 -3px 0 #0d1a0a, 0 6px 0 #1d2f15;
      border: 2px solid #b3964b;
      transform: scale(1);
      transition: 0.1s;
      font-family: 'Segoe UI', 'Naruto', sans-serif;
    }

    .score-box span {
      color: #ffd966;
      font-size: 2rem;
      margin-right: 6px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      background: #e7b45a;
      border: none;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1.2rem;
      color: #1e2d1a;
      box-shadow: 0 7px 0 #8f6b34, inset 0 2px 8px #ffe09c;
      cursor: pointer;
      transition: 0.06s linear;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid #c9923d;
      letter-spacing: 1px;
    }

    .btn:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #6e4f28;
    }

    .btn.reset {
      background: #c9814a;
      box-shadow: 0 7px 0 #7f542d;
      border-color: #a86730;
      color: #fcf3dd;
    }

    .btn.reset:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #5f3d21;
    }

    .info-text {
      background: #2f2418;
      padding: 6px 18px;
      border-radius: 40px;
      color: #f7dba7;
      font-size: 1.1rem;
      border: 2px solid #bc8b4b;
      box-shadow: inset 0 -2px 0 #4f3822;
      font-weight: 600;
      font-family: 'Segoe UI', monospace;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding: 0 6px;
      font-size: 0.9rem;
      color: #28381c;
      font-weight: 500;
      background: #dba16b;
      border-radius: 40px;
      padding: 8px 18px;
      background: #b8864b;
      border: 2px solid #b47b48;
      color: #ffeee0;
    }

    .footer span {
      filter: drop-shadow(0 1px 0 #4e3a20);
    }

    /* responsif */
    @media (max-width: 600px) {
      .game-board {
        width: 90vw;
        height: 50vw;
        min-height: 220px;
      }
      .game-container {
        padding: 16px;
        border-radius: 48px;
      }
      .score-box {
        font-size: 1.3rem;
        padding: 4px 14px;
      }
      .btn {
        padding: 6px 12px;
        font-size: 1rem;
      }
      .naruto, .ramen {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="game-panel">
    <div class="game-board" id="gameBoard">
      <!-- Naruto -->
      <div class="naruto" id="naruto">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f9b81b' stroke='%23d48d00' stroke-width='4'/%3E%3Ccircle cx='30' cy='38' r='8' fill='white'/%3E%3Ccircle cx='70' cy='38' r='8' fill='white'/%3E%3Ccircle cx='30' cy='38' r='4' fill='%23333'/%3E%3Ccircle cx='70' cy='38' r='4' fill='%23333'/%3E%3Cpath d='M30 60 Q50 80 70 60' stroke='%23b45f1a' stroke-width='8' fill='none' stroke-linecap='round'/%3E%3Crect x='42' y='12' width='16' height='12' fill='%23e67e22' rx='4'/%3E%3Cpath d='M20 22 L40 8 L60 8 L80 22 L70 18 L50 24 L30 18 Z' fill='%23d35400'/%3E%3C/svg%3E" alt="Naruto" />
      </div>
      <!-- Ramen -->
      <div class="ramen" id="ramen">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='48' r='38' fill='%23cd7f32' stroke='%23945f1a' stroke-width='4'/%3E%3Ccircle cx='50' cy='48' r='28' fill='%23e8b86b'/%3E%3Cpath d='M25 55 L75 55 L70 70 L30 70 Z' fill='%23b35e1a'/%3E%3Ccircle cx='40' cy='48' r='6' fill='%23e06b2b'/%3E%3Ccircle cx='60' cy='48' r='6' fill='%23e06b2b'/%3E%3Cpath d='M35 42 L48 30 L62 42 L48 38 Z' fill='%239fcd5a'/%3E%3C/svg%3E" alt="ramen" />
      </div>
    </div>

    <!-- status -->
    <div class="status-bar">
      <div class="score-box"><span>🍜</span> <span id="scoreDisplay">0</span></div>
      <div class="controls">
        <button class="btn" id="resetBtn">⬅️ Kembali</button>
        <button class="btn reset" id="resetGameBtn">🌀 Reset</button>
      </div>
    </div>
    <div class="footer">
      <span>⚡ Gerakan: WASD / panah</span>
      <span>🎯 Tangkap Ramen!</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // Elemen
    const board = document.getElementById('gameBoard');
    const naruto = document.getElementById('naruto');
    const ramen = document.getElementById('ramen');
    const scoreSpan = document.getElementById('scoreDisplay');

    // State
    let score = 0;
    let narutoX = 40;       // posisi kiri (px)
    let narutoY = 20;       // posisi bawah (px) -> bottom
    let ramenX = 200;
    let ramenY = 30;

    // konstrain board
    const boardWidth = 520;
    const boardHeight = 320;
    const charSize = 64;    // ukuran karakter (kurang lebih)
    const ramenSize = 58;

    // kecepatan gerak
    const MOVE_STEP = 12;

    // --- fungsi update posisi ---
    function updatePositions() {
      // batasi naruto agar tidak keluar board
      const maxX = boardWidth - charSize;
      const maxY = boardHeight - charSize;
      narutoX = Math.min(maxX, Math.max(0, narutoX));
      narutoY = Math.min(maxY, Math.max(0, narutoY));

      naruto.style.left = narutoX + 'px';
      naruto.style.bottom = narutoY + 'px';

      // batasi ramen (tapi biar random, tetap aman)
      ramenX = Math.min(boardWidth - ramenSize, Math.max(0, ramenX));
      ramenY = Math.min(boardHeight - ramenSize, Math.max(0, ramenY));
      ramen.style.left = ramenX + 'px';
      ramen.style.bottom = ramenY + 'px';
    }

    // --- cek tabrakan (deteksi kotak) ---
    function checkCollision() {
      // Naruto bounding box
      const nLeft = narutoX;
      const nRight = narutoX + charSize;
      const nBottom = narutoY;
      const nTop = narutoY + charSize;

      // Ramen bounding box
      const rLeft = ramenX;
      const rRight = ramenX + ramenSize;
      const rBottom = ramenY;
      const rTop = ramenY + ramenSize;

      if (nLeft < rRight && nRight > rLeft && nBottom < rTop && nTop > rBottom) {
        // TANGKAP!
        score++;
        scoreSpan.textContent = score;
        // pindahkan ramen ke posisi acak (dengan animasi)
        spawnRamenRandom();
        // efek kilat di background (hanya visual)
        board.style.backgroundColor = '#b3d9b3';
        setTimeout(() => board.style.backgroundColor = '', 120);
        return true;
      }
      return false;
    }

    // --- spawn ramen di posisi random ---
    function spawnRamenRandom() {
      const maxX = boardWidth - ramenSize;
      const maxY = boardHeight - ramenSize;
      // hindari spawn di atas naruto (opsional, biar adil)
      let newX, newY;
      let attempts = 0;
      do {
        newX = Math.floor(Math.random() * (maxX - 10)) + 5;
        newY = Math.floor(Math.random() * (maxY - 10)) + 5;
        attempts++;
        // jarak minimal dari naruto (100px) biar gak langsung ketangkep
        const dx = newX - narutoX;
        const dy = newY - narutoY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 100 || attempts > 30) break;
      } while (true);

      ramenX = newX;
      ramenY = newY;
      updatePositions();
    }

    // --- reset permainan ---
    function resetGame() {
      score = 0;
      scoreSpan.textContent = '0';
      narutoX = 40;
      narutoY = 20;
      // ramen di posisi awal
      ramenX = 200;
      ramenY = 30;
      updatePositions();
      board.style.backgroundColor = '';
    }

    // --- gerakan Naruto ---
    function moveNaruto(dx, dy) {
      narutoX += dx;
      narutoY += dy;
      // batasi
      narutoX = Math.min(boardWidth - charSize, Math.max(0, narutoX));
      narutoY = Math.min(boardHeight - charSize, Math.max(0, narutoY));
      updatePositions();
      checkCollision();   // cek tabrakan setiap gerakan
    }

    // --- event keyboard ---
    function handleKey(e) {
      const key = e.key;
      // WASD + panah
      const isArrow = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key);
      if (isArrow || ['w','W','a','A','s','S','d','D'].includes(key)) {
        e.preventDefault();
      }

      let dx = 0, dy = 0;
      if (key === 'ArrowUp' || key === 'w' || key === 'W') dy = MOVE_STEP;
      else if (key === 'ArrowDown' || key === 's' || key === 'S') dy = -MOVE_STEP;
      else if (key === 'ArrowLeft' || key === 'a' || key === 'A') dx = -MOVE_STEP;
      else if (key === 'ArrowRight' || key === 'd' || key === 'D') dx = MOVE_STEP;
      else return;

      moveNaruto(dx, dy);
    }

    // --- event listener ---
    document.addEventListener('keydown', handleKey);

    // --- reset button ---
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);

    // --- tombol "kembali" (reset posisi Naruto ke kiri bawah) ---
    document.getElementById('resetBtn').addEventListener('click', function() {
      narutoX = 30;
      narutoY = 20;
      updatePositions();
      // cek collision setelah reset posisi
      checkCollision();
    });

    // --- tambahan: gerakan dengan klik board (mobile / desktop) ---
    board.addEventListener('click', function(e) {
      const rect = board.getBoundingClientRect();
      const scaleX = board.offsetWidth / rect.width;   // perbandingan ukuran asli
      const scaleY = board.offsetHeight / rect.height;
      // posisi klik relatif terhadap board (px)
      const clickX = (e.clientX - rect.left) * scaleX;
      const clickY = (e.clientY - rect.top) * scaleY;
      // konversi ke koordinat left/bottom (board height - klikY)
      const targetX = Math.min(boardWidth - charSize, Math.max(0, clickX - charSize/2));
      const targetY = Math.min(boardHeight - charSize, Math.max(0, (boardHeight - clickY) - charSize/2));
      // lerp / langsung pindah
      narutoX = targetX;
      narutoY = targetY;
      updatePositions();
      checkCollision();
    });

    // --- inisialisasi posisi ---
    resetGame();

    // tambahan: spawn ramen setelah 0.3s pertama (biar posisi random)
    setTimeout(() => {
      spawnRamenRandom();
    }, 200);

    // saat window di-resize, update posisi agar tetap proporsional (tapi board fixed)
    window.addEventListener('resize', function() {
      // hanya update posisi biar konsisten
      updatePositions();
    });

    // jika board di-klik, jangan trigger konteks
    board.addEventListener('contextmenu', (e) => e.preventDefault());

    console.log('🍜 Permainan Naruto · Kejar Ramen! Gunakan WASD / panah.');
  })();
</script>
</body>
</html>
